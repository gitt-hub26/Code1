{% extends "base.html" %}
{% block content %}
<h2>Manage Products</h2>

<a href="{{ url_for('producer_add_product') }}" class="btn btn-primary">Add Product</a>

<table class="table">
  <thead>
    <tr>
      <th>Name</th><th>Category</th><th>Stock</th><th>Price</th><th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr>
      <td>{{ p.name }}</td>
      <td>{{ p.category.name }}</td>
      <td>{{ p.stock }}</td>
      <td>£{{ '%.2f'|format(p.price) }}</td>
      <td>
        <a href="{{ url_for('producer_edit_product', product_id=p.id) }}">Edit</a>
        <form method="post" action="{{ url_for('producer_delete_product', product_id=p.id) }}" style="display:inline;">
          <button class="btn btn-danger">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
