<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Greenfield Local Hub</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('home') }}">Greenfield LOCAL HUB</a>
    <div>
      <a class="nav-link d-inline" href="{{ url_for('home') }}">Home</a>
      <a class="nav-link d-inline" href="{{ url_for('shop') }}">Shop</a>
      <a class="nav-link d-inline" href="{{ url_for('login') }}">Sign In</a>
      <a class="nav-link d-inline" href="{{ url_for('account') }}">Account</a>
      <a class="nav-link d-inline" href="{{ url_for('basket') }}">🛒</a>
    </div>
  </div>
</nav>

<div class="container mb-5">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 border-top">
  Copyright © 2026 Greenfield Local Hub
</footer>
</body>
</html>
