<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Greenfield Local Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script defer src="{{ url_for('static', filename='main.js') }}"></script>
</head>
<body>
<header>
  <div class="navbar">
    <div class="logo">
      <a href="{{ url_for('home') }}" style="text-decoration:none;color:#222;">
        <strong>Greenfield LOCAL HUB</strong>
      </a>
    </div>
    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('shop') }}">Shop</a>
      <a href="{{ url_for('login') }}">Sign In</a>
      <a href="{{ url_for('account') }}">Account</a>
      <a href="{{ url_for('basket') }}">🛒</a>
    </nav>
  </div>
</header>

<main class="container">
  {% block content %}{% endblock %}
</main>

<footer style="text-align:center;padding:1rem;border-top:1px solid #ddd;background:#fff;">
  Copyright © 2026 Greenfield Local Hub
</footer>
</body>
</html>
