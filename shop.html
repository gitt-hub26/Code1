{% extends "base.html" %}
{% block content %}
<h2>Shop</h2>
<div class="row">
  {% for product in products %}
  <div class="col-md-4 mb-4">
    <div class="card h-100">
      <img src="https://via.placeholder.com/400x250" class="card-img-top" alt="{{ product.name }}">
      <div class="card-body">
        <h5 class="card-title">{{ product.name }}</h5>
        <p class="card-text">{{ product.description }}</p>
        <p class="fw-bold">£{{ '%.2f'|format(product.price) }}</p>
        <a href="{{ url_for('add_to_basket', product_id=product.id) }}" class="btn btn-warning">
          Add to Basket
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
