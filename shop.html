{% extends "base.html" %}
{% block content %}
<h2>Shop</h2>
<div class="card-grid">
  {% for product in products %}
  <article class="card">
    <img src="https://via.placeholder.com/400x250"
         alt="{{ product.name }}"
         style="width:100%;border-radius:4px;margin-bottom:0.5rem;">
    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>
    <p><strong>£{{ '%.2f'|format(product.price) }}</strong></p>
    <a href="{{ url_for('add_to_basket', product_id=product.id) }}" class="btn btn-primary">
      Add to Basket
    </a>
  </article>
  {% endfor %}
</div>
{% endblock %}
