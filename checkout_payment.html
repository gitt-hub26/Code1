{% extends "base.html" %}
{% block content %}
<h2>Checkout</h2>
<p>Complete your order</p>

<section class="card">
  <h3>Enter payment details</h3>
  <p>Credit / Debit Card</p>
  <form method="post">
    {{ form.hidden_tag() }}
    <div class="form-group">
      <label>Card Number</label>
      {{ form.card_number() }}
    </div>
    <div class="form-group">
      <label>Expiry Date</label>
      {{ form.expiry_date() }}
    </div>
    <div class="form-group">
      <label>CVC</label>
      {{ form.cvc() }}
    </div>
    <button type="submit" class="btn btn-primary">Place Order</button>
  </form>
</section>
{% endblock %}
